name: TelegramDownloader

on:
  workflow_dispatch:
    inputs:
      telegram_link:
        description: '🔗 Telegram post link'
        required: true
        type: string
      split_threshold_mb:
        description: '📦 Maximum file size per part (MB)'
        required: false
        type: number
        default: 90

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📂 Clone repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq zip openssl

      - name: 📡 Get direct link and fix spaces
        id: get_link
        run: |
          TELEGRAM_LINK="${{ github.event.inputs.telegram_link }}"
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "🔗 Telegram link: $TELEGRAM_LINK"
          echo "═══════════════════════════════════════════════════════════════"
          
          RESPONSE=$(curl -s -X POST \
            -H "User-Agent: Mozilla/5.0" \
            -d "telegram_link=$TELEGRAM_LINK" \
            https://telegramdownloader.net/proxy.php)
          
          RAW_URL=$(echo "$RESPONSE" | jq -r '.data.data.link')
          FILE_NAME=$(echo "$RESPONSE" | jq -r '.data.data.file_name')
          
          if [ -z "$RAW_URL" ] || [ "$RAW_URL" = "null" ]; then
            echo "❌ Error: Could not get download link!"
            exit 1
          fi
          
          # Convert spaces to dash in URL
          CORRECTED_URL=$(echo "$RAW_URL" | sed 's/%20/-/g' | sed 's/ /-/g')
          
          echo "✅ Direct link received!"
          echo "📄 Original filename: $FILE_NAME"
          
          echo "download_url=$CORRECTED_URL" >> $GITHUB_OUTPUT
          echo "original_name=$FILE_NAME" >> $GITHUB_OUTPUT

      - name: ⬇️ Download file
        id: download
        run: |
          URL="${{ steps.get_link.outputs.download_url }}"
          ORIGINAL_NAME="${{ steps.get_link.outputs.original_name }}"
          
          mkdir -p downloads
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "⬇️ Downloading..."
          echo "═══════════════════════════════════════════════════════════════"
          
          curl -L --progress-bar \
            --max-time 7200 \
            --retry 10 \
            --retry-delay 10 \
            -C - \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
            -H "Referer: https://telegramdownloader.net/" \
            -o "downloads/$ORIGINAL_NAME" \
            "$URL"
          
          if [ ! -f "downloads/$ORIGINAL_NAME" ]; then
            echo "❌ Download failed!"
            exit 1
          fi
          
          SIZE=$(stat -c%s "downloads/$ORIGINAL_NAME")
          
          if [ "$SIZE" -lt 1024 ]; then
            echo "❌ ERROR: Invalid file (${SIZE} bytes)"
            rm "downloads/$ORIGINAL_NAME"
            exit 1
          fi
          
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "✅ Download complete! Size: ${SIZE_MB} MB"
          echo "file_size=$SIZE" >> $GITHUB_OUTPUT

      - name: ✂️ Split large file
        if: github.event.inputs.split_threshold_mb != '0'
        run: |
          THRESHOLD="${{ github.event.inputs.split_threshold_mb }}"
          FILENAME="${{ steps.get_link.outputs.original_name }}"
          FILE_SIZE="${{ steps.download.outputs.file_size }}"
          LIMIT=$((THRESHOLD * 1024 * 1024))
          
          if [ -n "$FILE_SIZE" ] && [ "$FILE_SIZE" -gt "$LIMIT" ]; then
            echo "✂️ Splitting into ${THRESHOLD}MB parts..."
            cd downloads
            zip -s "${THRESHOLD}m" "${FILENAME}.zip" -j "$FILENAME"
            rm "$FILENAME"
            cd ..
          fi

      - name: 🔄 Fix filenames (remove Persian/Arabic, special chars)
        run: |
          cd downloads
          
          for file in *; do
            [ -e "$file" ] || continue
            
            EXT="${file##*.}"
            if [[ "$EXT" == "$file" ]]; then
              EXT="bin"
            fi
            
            if [[ "$file" =~ [^[:ascii:]] ]]; then
              RANDOM_NAME=$(openssl rand -hex 8)
              NEW_NAME="${RANDOM_NAME}.${EXT}"
              echo "   🌐 Renaming: $file -> $NEW_NAME"
              mv "$file" "$NEW_NAME"
            else
              CLEAN_NAME=$(echo "$file" | sed 's/[^a-zA-Z0-9._-]/_/g' | sed 's/__*/_/g')
              if [ "$file" != "$CLEAN_NAME" ]; then
                echo "   📝 Cleaning: $file -> $CLEAN_NAME"
                mv "$file" "$CLEAN_NAME"
              fi
            fi
          done
          
          cd ..

      - name: 📤 Upload to GitHub (Batch upload - 1 file at a time)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"  # ✅ بدون نقطه
          
          if [ ! -d "downloads" ] || [ -z "$(ls -A downloads 2>/dev/null)" ]; then
            echo "⚠️ No files to upload!"
            exit 1
          fi
          
          # Get list of files
          FILES=($(ls downloads/ | sort))
          TOTAL=${#FILES[@]}
          
          echo "═══════════════════════════════════════════════════════════════"
          echo "📦 Total files to upload: $TOTAL"
          echo "═══════════════════════════════════════════════════════════════"
          
          # Upload ONE file at a time to avoid HTTP 500
          for (( i=0; i<TOTAL; i++ )); do
            echo ""
            echo "🚀 Uploading file $((i+1)) of $TOTAL: ${FILES[$i]}"
            
            git add "downloads/${FILES[$i]}"
            git commit -m "Add ${FILES[$i]} [skip ci]"
            
            # Push with retry
            for attempt in 1 2 3; do
              if git push origin main 2>&1; then
                echo "   ✅ Uploaded successfully"
                break
              else
                if [ $attempt -lt 3 ]; then
                  echo "   ⚠️ Push failed, retry $attempt/3..."
                  git reset --soft HEAD~1
                  sleep 5
                else
                  echo "   ❌ Failed to upload ${FILES[$i]}"
                  git reset --soft HEAD~1
                fi
              fi
            done
            
            sleep 2
          done
          
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "🎉 All $TOTAL files uploaded successfully!"
          echo ""
          echo "📂 Uploaded files:"
          ls -lh downloads/
          echo "═══════════════════════════════════════════════════════════════"

      - name: 📋 Final report
        if: always()
        run: |
          echo ""
          echo "┌─────────────────────────────────────────────────────────────┐"
          echo "│                   Download Final Report                    │"
          echo "├─────────────────────────────────────────────────────────────┤"
          echo "│ 🔗 Link: ${{ github.event.inputs.telegram_link }}"
          echo "│ 📁 Path: ./downloads/"
          echo "└─────────────────────────────────────────────────────────────┘"
